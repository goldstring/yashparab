<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>

    <!-- GOOGLE FONTS -->

    <style>
      .list-group-item span:first-child {
  font-weight: 800;
  text-transform: uppercase;
} 
.zoom {

  transition: transform .2s; /* Animation */

}
.zoom:hover {
  cursor: pointer;
  transform: scale(1.1); /* (150% zoom - Note: if the zoom is too large, it will go outside of the viewport) */
}
.card-title {
  max-height: 3em;           /* Restrict title height */
  overflow: hidden;          /* Hide overflow */
  white-space: nowrap;       /* Prevent text from wrapping */
  text-overflow: ellipsis;   /* Add ellipsis for overflow text */
}
    </style>

  <body class="navbar-fixed sidebar-fixed" id="body">
    <script>
    NProgress.configure({ showSpinner: false });
    NProgress.start();
    </script>

    ——— WRAPPER
    ===================================== -->

            </a>
          </div>
          <!-- begin sidebar scrollbar -->
          <div class="sidebar-left" id="menubar" data-simplebar style="height: 100%;">

          </div>
          <div class="sidebar-footer">
            <div class="sidebar-footer-content">
              <a href="resume/resume.pdf" style="white-space: nowrap;font-weight: 600;" class="btn btn-primary" download="resume/resume.pdf">
                Click To Download Resume
               </a>

          </div>

              <button id="sidebar-toggler" class="sidebar-toggle">
              <span class="sr-only">Toggle navigation</span>
              </button>
              <span class="page-title">Portfolio</span>
              <div class="navbar-right ">

                    </button>
                 
                    </li>
                  </ul>
                </div>

                </div>

                </div>
